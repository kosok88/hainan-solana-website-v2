<!DOCTYPE html>
<html lang="zh" x-data="parkApp()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title x-text="park ? park.name[lang] + ' | Solana Hainan' : '园区详情'"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="js/parksData.js"></script> </head>
<body class="bg-slate-950 text-slate-300 font-sans">

    <nav class="fixed w-full z-50 bg-slate-950/80 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="parks.html" class="text-blue-500 font-bold">← 返回列表</a>
            <div class="flex gap-4">
                <button @click="changeLang('cn')" :class="lang==='cn' ? 'text-white font-bold' : 'text-slate-500'">中文</button>
                <button @click="changeLang('en')" :class="lang==='en' ? 'text-white font-bold' : 'text-slate-500'">EN</button>
                <button @click="changeLang('ru')" :class="lang==='ru' ? 'text-white font-bold' : 'text-slate-500'">РУ</button>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-6 max-w-4xl mx-auto" x-show="park">
        <div class="mb-12">
            <h1 class="text-4xl md:text-6xl font-black text-white mb-4" x-text="park.name[lang]"></h1>
            <p class="text-xl text-blue-400" x-text="park.subtitle[lang]"></p>
        </div>

        <div class="space-y-12">
            <section>
                <h2 class="text-xl font-bold text-white border-l-4 border-blue-600 pl-4 mb-4">园区定位 / Positioning</h2>
                <p class="text-lg leading-relaxed text-slate-400" x-text="park.positioning[lang]"></p>
            </section>

            <section class="bg-slate-900/50 p-8 rounded-3xl border border-slate-800">
                <h2 class="text-xl font-bold text-white mb-6">优惠政策 / Policies</h2>
                <div class="grid gap-4">
                    <template x-for="policy in park.policies">
                        <div class="flex items-center gap-3">
                            <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                            <span x-text="policy[lang]"></span>
                        </div>
                    </template>
                </div>
            </section>

            <section>
                <h2 class="text-xl font-bold text-white mb-4">联系方式 / Contact</h2>
                <p class="text-slate-400">📍 <span x-text="park.address[lang]"></span></p>
            </section>
        </div>
    </main>

    <script>
        function parkApp() {
            return {
                lang: localStorage.getItem('lang') || 'cn',
                park: null,
                init() {
                    const urlParams = new URLSearchParams(window.location.search);
                    const id = urlParams.get('id'); // 获取 URL 里的 ?id=parkXX
                    this.park = parksFullData[id];
                    if (!this.park) window.location.href = 'parks.html';
                },
                changeLang(l) {
                    this.lang = l;
                    localStorage.setItem('lang', l);
                }
            }
        }
    </script>
</body>
</html>
