<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>园区详情 | Solana Hainan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="js/parksData.js"></script>
</head>
<body class="bg-slate-950 text-slate-300" x-data="parkApp()" x-init="init()">
    <nav class="p-6 border-b border-slate-800 flex justify-between items-center">
        <a href="parks.html" class="text-blue-500">← 返回列表</a>
        <div class="flex gap-4">
            <button @click="lang='cn'" :class="lang==='cn'?'text-white':'text-slate-500'">中</button>
            <button @click="lang='en'" :class="lang==='en'?'text-white':'text-slate-500'">EN</button>
            <button @click="lang='ru'" :class="lang==='ru'?'text-white':'text-slate-500'">RU</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 pt-10" x-show="park">
        <h1 class="text-4xl font-bold text-white mb-2" x-text="park.name_zh || park.name[lang]"></h1>
        <p class="text-blue-400 text-xl mb-8" x-text="park.subtitle_zh || park.subtitle[lang]"></p>
        
        <div class="prose prose-invert max-w-none" x-html="lang==='cn' ? (park.detail_zh || park.positioning.cn) : (park.detail_en || park.positioning.en)">
            </div>
    </main>

    <script>
        function parkApp() {
            return {
                lang: 'cn',
                park: null,
                init() {
                    // 自动从 URL 获取 ?id=...
                    const id = new URLSearchParams(window.location.search).get('id');
                    // 这里的 parksFullData 必须对应你 js 文件里的变量名
                    // 如果你 js 里叫 parksData，这里就改叫 parksData
                    const db = window.parksFullData || window.parksData;
                    
                    if (db && id) {
                        this.park = db[id];
                    }
                    
                    if (!this.park) {
                        console.error("未找到数据，请检查 ID 和数据库变量名");
                    }
                }
            }
        }
    </script>
</body>
</html>
