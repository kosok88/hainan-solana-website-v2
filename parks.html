<!DOCTYPE html>
<html lang="zh" x-data="parksPage()" x-init="init()" x-cloak>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13 Major Parks | Solana-Hainan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="js/parksData.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&display=swap');
        [x-cloak] { display: none !important; }
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #020617; color: #cbd5e1; }
        .park-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.3); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .park-card:hover { border-color: #3b82f6; transform: translateY(-5px); box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="bg-[#020617]">
    <nav class="fixed top-0 w-full z-50 bg-[#020617]/90 backdrop-blur-xl border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3 group">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white text-xl group-hover:bg-blue-500 transition">S</div>
                <span class="text-white font-black tracking-tighter text-lg uppercase italic group-hover:text-blue-400 transition">Solana<span class="text-blue-500">Hainan</span></span>
            </a>
            <button @click="toggleLang()" class="text-xs border border-slate-700 px-3 py-1.5 rounded text-slate-400 hover:text-white hover:border-slate-500 transition uppercase font-bold" x-text="lang === 'cn' ? 'EN' : (lang === 'en' ? 'РУ' : '中文')"></button>
        </div>
    </nav>

    <header class="pt-40 pb-16 px-6 text-center">
        <h1 class="text-5xl md:text-6xl font-black text-white italic uppercase tracking-tighter mb-6" x-text="t('header')"></h1>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-32">
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <template x-for="(park, id) in allParks" :key="id">
                <div class="park-card p-8 rounded-[2rem] flex flex-col justify-between h-full group">
                    <div>
                        <div class="text-sm font-mono text-blue-400 font-bold tracking-widest uppercase mb-4" x-text="park.subtitle[lang]"></div>
                        <h3 class="text-white text-3xl font-black mb-4" x-text="park.name[lang]"></h3>
                        <p class="text-slate-400 text-sm leading-relaxed mb-6" x-text="lang === 'cn' ? park.brief_zh : park.brief_en"></p>
                    </div>
                    <a :href="'park-detail.html?id=' + id" class="mt-8 inline-flex items-center text-base font-black uppercase tracking-widest text-blue-500 group-hover:text-blue-300 transition-colors">
                        <span x-text="t('view')"></span>
                        <svg class="w-5 h-5 ml-2 transform group-hover:translate-x-2 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                    </a>
                </div>
            </template>
        </div>
    </main>

    <script>
        function parksPage() {
            return {
                lang: localStorage.getItem('site_lang') || 'cn',
                allParks: {},
                init() { this.allParks = window.parksData; },
                toggleLang() {
                    const langs = ['cn', 'en', 'ru'];
                    this.lang = langs[(langs.indexOf(this.lang) + 1) % 3];
                    localStorage.setItem('site_lang', this.lang);
                },
                t(key) {
                    const i18n = {
                        header: { cn: '13 大重点园区', en: '13 KEY PARKS', ru: '13 КЛЮЧЕВЫХ ПАРКОВ' },
                        view: { cn: '查看详细信息', en: 'VIEW FULL DETAILS', ru: 'ПОДРОБНАЯ ИНФОРМАЦИЯ' }
                    };
                    return i18n[key][this.lang];
                }
            }
        }
    </script>
</body>
</html>
