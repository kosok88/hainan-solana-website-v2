<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>封关元年倒计时与智能服务</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 顶部滚动公告栏 */
        .marquee-container {
            width: 100%;
            background-color: #1a1a1a;
            color: #fff;
            padding: 10px 0;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 20s linear infinite;
            font-size: 14px;
            letter-spacing: 1px;
        }
        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        /* 主体内容区 */
        .main-container {
            margin-top: 80px; /* 避开顶部滚动栏 */
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 90%;
        }

        /* 倒计时样式 */
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 20px;
        }
        .countdown-box {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        .time-block {
            background: #fff;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            min-width: 80px;
        }
        .time-block span {
            display: block;
        }
        .time-number {
            font-size: 32px;
            font-weight: bold;
            color: #007aff;
        }
        .time-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        /* 下单按钮 */
        .order-btn {
            background: linear-gradient(90deg, #007aff, #00c6ff);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .order-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 122, 255, 0.6);
        }
        .order-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* AI助手悬浮窗 */
        .ai-chatbot {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }
        .ai-btn {
            width: 60px;
            height: 60px;
            background: #1a1a1a;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
            font-weight: bold;
        }
        .ai-btn:hover {
            transform: scale(1.1);
        }
        
        .chat-window {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 300px;
            height: 400px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #1a1a1a;
            color: #fff;
            padding: 15px;
            font-size: 16px;
            text-align: center;
            font-weight: bold;
        }
        .chat-body {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f9f9f9;
        }
        .message {
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.4;
        }
        .ai-msg { color: #333; background: #e0e0e0; padding: 10px; border-radius: 10px 10px 10px 0; max-width: 80%; float: left; clear: both;}
        .user-msg { color: #fff; background: #007aff; padding: 10px; border-radius: 10px 10px 0 10px; max-width: 80%; float: right; clear: both;}
        
        .chat-input-area {
            display: flex;
            border-top: 1px solid #eee;
            background: #fff;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
        }
        .chat-input-area button {
            background: #007aff;
            color: white;
            border: none;
            padding: 0 15px;
            cursor: pointer;
        }
        .chat-input-area button:hover { background: #005bb5; }

    </style>
</head>
<body>

    <div class="marquee-container">
        <div class="marquee-content">
            📢 最新公告：迎接封关元年，全场特惠活动火热进行中！ | 抢先体验封关特权，立即下单获取专属福利！ | 遇到问题请随时点击右下角AI助手咨询。
        </div>
    </div>

    <div class="main-container">
        <h1>迎接封关元年 倒计时</h1>
        <div class="countdown-box" id="countdown-box">
            <div class="time-block"><span class="time-number" id="days">00</span><span class="time-label">天</span></div>
            <div class="time-block"><span class="time-number" id="hours">00</span><span class="time-label">时</span></div>
            <div class="time-block"><span class="time-number" id="minutes">00</span><span class="time-label">分</span></div>
            <div class="time-block"><span class="time-number" id="seconds">00</span><span class="time-label">秒</span></div>
        </div>

        <button class="order-btn" onclick="alert('订单已生成，跳转至支付页面！')">立即下单抢占先机</button>
    </div>

    <div class="ai-chatbot">
        <div class="chat-window" id="chatWindow">
            <div class="chat-header">智能客服助手</div>
            <div class="chat-body" id="chatBody">
                <div class="message ai-msg">您好！我是AI助手，关于封关政策或下单流程，有什么我可以帮您的吗？</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="请输入您的问题..." onkeypress="handleEnter(event)">
                <button onclick="sendMessage()">发送</button>
            </div>
        </div>
        <div class="ai-btn" onclick="toggleChat()">AI</div>
    </div>

    <script>
        // --- 倒计时逻辑 ---
        const targetDate = new Date('2025-12-18T00:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById('countdown-box').innerHTML = '<h2 style="color:#007aff;">封关元年已正式开启！</h2>';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = days.toString().padStart(2, '0');
            document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        // --- AI助手逻辑 ---
        function toggleChat() {
            const chatWin = document.getElementById('chatWindow');
            chatWin.style.display = chatWin.style.display === 'flex' ? 'none' : 'flex';
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            // 添加用户消息
            appendMessage(message, 'user-msg');
            input.value = '';

            // 模拟AI回复延迟
            setTimeout(() => {
                appendMessage('已收到您的问题：“' + message + '”。目前系统正在接入AI大模型，稍后将为您提供详细解答。您可以先尝试点击“立即下单”体验流程！', 'ai-msg');
            }, 800);
        }

        function appendMessage(text, className) {
            const chatBody = document.getElementById('chatBody');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatBody.appendChild(msgDiv);
            chatBody.scrollTop = chatBody.scrollHeight; // 自动滚动到底部
        }

        function handleEnter(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
