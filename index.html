<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Hainan | 封关时代·全球资产交付中心</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+SC:wght@300;700;900&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --s-green: #14F195; --s-purple: #9945FF; --s-blue: #00C2FF; }
        [x-cloak] { display: none !important; }
        
        /* 1. 深度背景设计 */
        body { 
            background: #020205; color: #fff; font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(153,69,255,0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(20,241,149,0.1) 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* 2. 动态网格背景 */
        .grid-bg { 
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); 
            background-size: 60px 60px; 
        }

        /* 3. 高级排版与特效 */
        .gradient-text { 
            background: linear-gradient(90deg, #fff, var(--s-green), var(--s-blue)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .neon-card { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid rgba(255,255,255,0.05); 
            backdrop-filter: blur(30px); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .neon-card:hover { 
            border-color: var(--s-green); 
            transform: translateY(-8px); 
            background: rgba(255,255,255,0.05);
            box-shadow: 0 20px 40px rgba(20,241,149,0.1);
        }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { animation: marquee 45s linear infinite; }

        .lang-btn { font-weight: 900; font-size: 10px; opacity: 0.3; transition: 0.3s; cursor: pointer; }
        .lang-btn.active { opacity: 1; color: var(--s-green); border-bottom: 2px solid var(--s-green); }
        
        html { scroll-behavior: smooth; }

        /* 终端滚动条美化 */
        .terminal-scroll::-webkit-scrollbar { width: 4px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: rgba(20,241,149,0.3); border-radius: 10px; }
    </style>
</head>
<body x-data="app()" x-init="loadOrders()" class="antialiased overflow-x-hidden grid-bg">

    <div class="fixed top-0 w-full z-[200] bg-gradient-to-r from-s-purple via-black to-s-green text-white py-1.5 text-[9px] font-black uppercase tracking-[0.3em] border-b border-white/10 shadow-2xl">
        <div class="flex animate-marquee whitespace-nowrap">
            <template x-for="i in 2">
                <div class="flex items-center">
                    <span class="mx-12" x-text="t[lang].marquee1"></span>
                    <span class="mx-12 text-s-green" x-text="t[lang].marquee2"></span>
                    <span class="mx-12" x-text="t[lang].marquee3"></span>
                    <span class="mx-12 opacity-50 italic">SECURE GATEWAY: KOSOK0898@GMAIL.COM</span>
                </div>
            </template>
        </div>
    </div>

    <nav class="fixed top-[28px] w-full z-[150] bg-black/60 backdrop-blur-3xl border-b border-white/5 py-6 px-10">
        <div class="max-w-[1700px] mx-auto flex justify-between items-center">
            <div class="flex items-center gap-16">
                <a href="#" class="flex items-center gap-5 group">
                    <div class="w-12 h-12 bg-gradient-to-br from-s-purple to-s-green rounded-2xl flex items-center justify-center font-black text-black italic text-2xl shadow-[0_0_30px_rgba(153,69,255,0.3)]">S</div>
                    <div class="flex flex-col">
                        <span class="text-2xl font-black tracking-tighter uppercase italic leading-none">Solana Hainan</span>

                    </div>
                </a>
                <div class="hidden xl:flex gap-12 text-[11px] font-black uppercase tracking-[0.2em] text-gray-500">
                    <a href="#services" class="hover:text-s-green transition-colors" x-text="t[lang].menu1"></a>
                    <a href="#parks" class="hover:text-s-green transition-colors" x-text="t[lang].menu2"></a>
                    <a href="#terminal" class="hover:text-s-blue flex items-center gap-3 transition-colors">
                        <span class="w-2 h-2 bg-s-blue rounded-full animate-ping"></span><span x-text="t[lang].menu3"></span>

            </div>
