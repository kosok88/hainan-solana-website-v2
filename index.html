<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海南省索拉纳商务咨询中心 | 2026 全岛封关服务旗舰门户</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;500;900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --solana-blue: #00C2FF; --solana-purple: #9945FF; --solana-green: #14F195; }
        body { font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif; background: #fafafa; overflow-x: hidden; }
        .nav-active { color: var(--solana-blue); border-bottom: 2px solid var(--solana-blue); }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .hero-mesh { background: radial-gradient(at 0% 0%, rgba(20, 241, 149, 0.15) 0, transparent 50%), radial-gradient(at 100% 0%, rgba(153, 69, 255, 0.1) 0, transparent 50%); }
        .card-shadow { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-shadow:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
    </style>
</head>
<body x-data="siteController()" x-init="initSystem()">

    <div class="bg-black text-white py-1.5 overflow-hidden whitespace-nowrap text-[10px] font-bold tracking-widest uppercase">
        <div class="inline-block animate-marquee">
            <span class="mx-8">● 2026 海南全岛封关系统：运行中</span>
            <span class="mx-8 text-solana-green">● EF 离岸账户审批时效：3个工作日</span>
            <span class="mx-8 text-solana-blue">● 13大园区“实质性运营”审计标准已更新</span>
            <span class="mx-8">● 跨境资产交付协议 V2.0 强制执行中</span>
        </div>
    </div>

    <nav class="glass-nav sticky top-0 z-[1000] border-b border-slate-100 shadow-sm">
        <div class="max-w-[1600px] mx-auto px-6 h-24 flex justify-between items-center">
            <div class="flex items-center gap-4 group cursor-pointer" @click="page='home'">
                <div class="w-12 h-12 bg-black rounded-lg flex items-center justify-center group-hover:rotate-12 transition-transform">
                    <img src="logo.svg" class="w-8 h-8 invert" onerror="this.src='https://solana.com/favicon.ico'">
                </div>
                <div class="flex flex-col">
                    <span class="text-xl font-black tracking-tighter text-slate-900 leading-none">海南省索拉纳商务咨询中心</span>
                    <span class="text-[9px] text-solana-purple font-bold uppercase tracking-[0.3em] mt-1">Solana Hainan Business Center</span>
                </div>
            </div>

            <div class="hidden xl:flex items-center gap-12">
                <nav-item @click="page='home'" :class="page=='home' && 'nav-active'" class="nav-link cursor-pointer font-bold py-2">首页</nav-item>
                <nav-item @click="page='services'" :class="page=='services' && 'nav-active'" class="nav-link cursor-pointer font-bold py-2">服务与报价</nav-item>
                <nav-item @click="page='parks'" :class="page=='parks' && 'nav-active'" class="nav-link cursor-pointer font-bold py-2">13大园区</nav-item>
                <nav-item @click="page='resources'" :class="page=='resources' && 'nav-active'" class="nav-link cursor-pointer font-bold py-2">资源中心</nav-item>
                <nav-item @click="page='about'" :class="page=='about' && 'nav-active'" class="nav-link cursor-pointer font-bold py-2">关于我们</nav-item>
            </div>

            <div class="flex items-center gap-6">
                <div class="hidden sm:flex flex-col items-end mr-4">
                    <span class="text-[9px] text-slate-400 font-bold uppercase">Tracking Terminal</span>
                    <a href="#" class="text-[11px] font-black hover:text-solana-blue underline">追踪协议进度</a>
                </div>
                <button @click="page='auth'" class="text-sm font-bold text-slate-600 hover:text-black transition">登录</button>
                <button @click="page='auth'" class="bg-black text-white px-8 py-3 rounded-full text-sm font-bold hover:bg-solana-purple transition shadow-lg active:scale-95">免费注册</button>
            </div>
        </div>
    </nav>

    <main class="min-h-screen">

        <template x-if="page === 'home'">
            <div x-transition class="hero-mesh">
                <section class="max-w-7xl mx-auto px-6 pt-32 pb-24 flex flex-col items-center text-center">
                    <h1 class="text-7xl font-black tracking-tighter mb-8 leading-[1.1]">
                        封关时代的<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-solana-purple to-solana-blue">全球合规交付中心</span>
                    </h1>
                    <p class="text-xl text-slate-500 max-w-2xl mb-12 font-light">
                        海南省索拉纳中心是您在 2026 封关后的首席战略伙伴。我们链接 13 大园区，通过实质性运营审计，确保您的离岸资产安全。
                    </p>
                    <div class="flex gap-6">
                        <button @click="page='services'" class="bg-black text-white px-12 py-5 rounded-2xl font-black hover:shadow-2xl transition">开始办理协议</button>
                        <button @click="page='parks'" class="bg-white border border-slate-200 px-12 py-5 rounded-2xl font-bold hover:bg-slate-50 transition">探索产业园区</button>
                    </div>
                </section>

                <section class="max-w-7xl mx-auto px-6 grid grid-cols-2 lg:grid-cols-4 gap-8 pb-32">
                    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                        <div class="text-4xl font-black mb-2 text-solana-blue">15%</div>
                        <div class="text-xs text-slate-400 font-bold uppercase">企业所得税/个税顶格优惠</div>
                    </div>
                    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                        <div class="text-4xl font-black mb-2 text-solana-purple">EF</div>
                        <div class="text-xs text-slate-400 font-bold uppercase">自由贸易账户全闭环收付</div>
                    </div>
                    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                        <div class="text-4xl font-black mb-2 text-solana-green">30%</div>
                        <div class="text-xs text-slate-400 font-bold uppercase">加工增值免关税出口</div>
                    </div>
                    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                        <div class="text-4xl font-black mb-2 italic">2026</div>
                        <div class="text-xs text-slate-400 font-bold uppercase">全岛封关合规交付元年</div>
                    </div>
                </section>
            </div>
        </template>

        <template x-if="page === 'services'">
            <div x-transition class="py-24 max-w-7xl mx-auto px-6">
                <div class="mb-20">
                    <h2 class="text-5xl font-black italic mb-6 uppercase tracking-tighter text-slate-900">Services & Pricing</h2>
                    <p class="text-slate-500">根据企业规模与出海成熟度，提供模块化合规交付方案。</p>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                    <template x-for="plan in pricePlans">
                        <div class="bg-white p-12 rounded-[40px] border border-slate-100 card-shadow flex flex-col relative overflow-hidden">
                            <template x-if="plan.hot">
                                <div class="absolute top-0 right-0 bg-solana-purple text-white px-8 py-2 text-[10px] font-black uppercase">Most Popular</div>
                            </template>
                            <h3 class="text-2xl font-black mb-2 uppercase" x-text="plan.title"></h3>
                            <div class="flex items-baseline gap-2 mb-10">
                                <span class="text-5xl font-black italic tracking-tighter" x-text="plan.price"></span>
                                <span class="text-xs text-slate-400 font-bold uppercase">/ Year</span>
                            </div>
                            <ul class="space-y-6 mb-12 flex-grow">
                                <template x-for="f in plan.features">
                                    <li class="flex items-start gap-3 text-sm text-slate-600">
                                        <span class="text-solana-green">✔</span> <span x-text="f"></span>
                                    </li>
                                </template>
                            </ul>
                            <button @click="showDetail(plan.title)" class="w-full py-5 rounded-2xl bg-slate-900 text-white font-black uppercase text-xs tracking-widest hover:bg-solana-blue transition">办理此项协议</button>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <template x-if="page === 'parks'">
            <div x-transition class="py-24 max-w-[1600px] mx-auto px-6">
                <div class="flex flex-col md:flex-row justify-between items-end mb-20 gap-8">
                    <div class="max-w-2xl">
                        <h2 class="text-5xl font-black italic mb-6 uppercase tracking-tighter">The 13 Strategic Zones</h2>
                        <p class="text-slate-500 text-lg">从海口江东新区的总部经济，到洋浦的先进制造，我们为您匹配最佳落地节点。</p>
                    </div>
                    <div class="flex gap-4">
                        <button class="px-6 py-2 bg-slate-200 rounded-full text-xs font-bold uppercase">地图模式</button>
                        <button class="px-6 py-2 bg-black text-white rounded-full text-xs font-bold uppercase">列表模式</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                    <template x-for="park in parkList">
                        <div class="bg-white p-10 rounded-[35px] border border-slate-100 card-shadow group cursor-pointer" @click="openParkDetail(park)">
                            <div class="flex justify-between items-start mb-8">
                                <span class="px-4 py-1.5 bg-solana-blue/10 text-solana-blue text-[10px] font-black rounded-full uppercase" x-text="park.tag"></span>
                                <span class="text-xs font-mono text-slate-300" x-text="'ID:'+park.id"></span>
                            </div>
                            <h4 class="text-xl font-black mb-4 group-hover:text-solana-purple transition" x-text="park.name"></h4>
                            <p class="text-sm text-slate-500 leading-relaxed mb-8 h-20 overflow-hidden" x-text="park.desc"></p>
                            <div class="pt-6 border-t border-slate-50 flex justify-between items-center opacity-0 group-hover:opacity-100 transition">
                                <span class="text-[10px] font-black uppercase tracking-widest text-solana-purple italic">查看入驻政策清单</span>
                                <span>→</span>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <template x-if="page === 'resources'">
            <div x-transition class="py-24 max-w-7xl mx-auto px-6">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-20">
                    <div>
                        <h3 class="text-3xl font-black italic mb-12 uppercase">2026 SOP 合规交付流程</h3>
                        <div class="space-y-6">
                            <template x-for="(step, i) in sopSteps">
                                <div class="flex gap-6 group">
                                    <div class="text-3xl font-black italic text-slate-200 group-hover:text-solana-green transition" x-text="i+1"></div>
                                    <div class="pb-6 border-b border-slate-100 flex-grow">
                                        <h4 class="font-bold text-slate-900 mb-2" x-text="step.title"></h4>
                                        <p class="text-sm text-slate-500" x-text="step.desc"></p>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                    <div>
                        <h3 class="text-3xl font-black italic mb-12 uppercase">媒体与实况</h3>
                        <div class="aspect-video bg-slate-900 rounded-3xl mb-8 flex items-center justify-center relative overflow-hidden group">
                            <div class="absolute inset-0 bg-[url('hainan-bridge.png')] bg-cover opacity-50 grayscale group-hover:grayscale-0 transition duration-700"></div>
                            <button class="relative z-10 w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-2xl hover:scale-110 transition">
                                <span class="text-3xl">▶</span>
                            </button>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-slate-100 h-32 rounded-2xl flex items-center justify-center font-bold text-slate-400">下载：2026封关手册.pdf</div>
                            <div class="bg-slate-100 h-32 rounded-2xl flex items-center justify-center font-bold text-slate-400">下载：实质性运营自测表</div>
                        </div>
                    </div>
                </div>
            </div>
        </template>

    </main>

    <footer class="bg-white border-t border-slate-100 pt-24 pb-12">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex flex-wrap justify-between items-center gap-12 mb-20">
                <div class="flex items-center gap-8 opacity-40 grayscale hover:grayscale-0 hover:opacity-100 transition duration-500">
                    <img src="alipay.jpg" class="h-8" alt="Alipay">
                    <img src="wechat_pay.jpg" class="h-8" alt="WeChat Pay">
                    <img src="logo-solana.webp" class="h-10" alt="Solana">
                </div>
                <div class="text-right">
                    <div class="text-[10px] font-black uppercase text-slate-400 mb-2">Service Hot-Line</div>
                    <div class="text-2xl font-black italic tracking-tighter">+86 (0898) 8888 6666</div>
                </div>
            </div>
            <div class="pt-12 border-t border-slate-50 flex flex-col md:flex-row justify-between gap-8 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                <div>© 2026 HAINAN SOLANA BUSINESS CONSULTING CENTER.</div>
                <div class="flex gap-8">
                    <a href="agreement.html" class="hover:text-black transition">服务协议</a>
                    <a href="#" class="hover:text-black transition">隐私声明</a>
                    <a href="#" class="hover:text-black transition">后台入口</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        function siteController() {
            return {
                page: 'home', // 控制当前视图 (L1, L2)
                
                parkList: [
                    { id: 1, name: "海口江东新区", tag: "HQ Economy", desc: "封关后跨国公司总部首选地，外资准入最快路径。主打现代服务业与融资租赁。" },
                    { id: 2, name: "洋浦经济开发区", tag: "Manufacturing", desc: "加工增值30%免关税政策核爆点。适合出口型实体与能源贸易。" },
                    { id: 3, name: "复兴城互联网园", tag: "Digital Trade", desc: "数字游民圣地，Web3与离岸数据出口核心节点。" },

                    { id: 5, name: "博鳌乐城医疗园", tag: "Healthcare", desc: "特许医疗、药物准入政策特区。全球生物医药资产管理。" },
                    { id: 6, name: "三亚崖州湾科技城", tag: "Deep Tech", desc: "深海、种业研发基地。拥有全岛最高科研补贴。" },

                ],

                pricePlans: [
                    { 
                        title: "基础入驻 (Standard)", price: "￥1.5w", 
                        features: ["园区工商准入", "离岸财务托管", "实质性办公证明", "合规官预检报告"], 
                        hot: false 
                    },
                    {

                    { title: "园区红利筛选", desc: "对比13大园区政策确定性。" },
                    { title: "VIE 离岸架构", desc: "重设投资链路以适配 2026 新规。" }
                ],

                initSystem() {
                    console.log("Solana Hainan V2 OS: Full Syncing...");
                },

                openParkDetail(park) {
                    alert(`进入三级页面：${park.name} 深度政策分析... (此处可跳转 detail.html?id=${park.id})`);

    </script>
</body>
</html>
