<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana海南 | 2026 海南封关全案交付中心</title>
    <meta name="description" content="专业提供海南自贸港公司注册、15%税收筹划、EF账户开立、59国免签咨询及Web3全案服务。">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        [x-cloak] { display: none !important; }
        body { background: #050505; color: #fff; font-family: 'Noto Sans SC', sans-serif; scroll-behavior: smooth; }
        .card-bg { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; transition: 0.3s; }
        .card-bg:hover { border-color: #14F195; background: rgba(255, 255, 255, 0.05); }
        .btn-primary { background: #14F195; color: #000; font-weight: 900; transition: 0.3s; cursor: pointer; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(20, 241, 149, 0.4); }
        .nav-link { font-size: 0.875rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .nav-link:hover { color: #14F195; }
        .input-field { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; color: #fff; outline: none; }
    </style>
</head>
<body x-data="site()" x-cloak class="antialiased">

    <div class="fixed top-0 w-full z-[110] bg-[#14F195] text-black text-[9px] font-black uppercase tracking-[0.3em] py-1 text-center">
        <span x-text="t('top_bar')"></span>
    </div>

    <nav class="fixed top-6 w-full z-[100] bg-black/90 backdrop-blur-lg border-b border-white/10 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="logo-solana.webp" alt="Logo" class="h-7">
                <span class="text-xl font-black">Solana<span class="text-gray-500 font-light">Hainan</span></span>
            </div>
            
            <div class="hidden lg:flex gap-6">
                <a @click="scrollTo('policy')" class="nav-link" x-text="t('nav_policy')"></a>
                <a @click="scrollTo('sop')" class="nav-link" x-text="t('nav_sop')"></a>
                <a @click="scrollTo('lifestyle')" class="nav-link" x-text="t('nav_life')"></a>
                <a @click="scrollTo('video')" class="nav-link" x-text="t('nav_video')"></a>
                <a href="services.html" class="nav-link text-[#14F195]" x-text="t('nav_pricing')"></a>
            </div>

            <div class="flex items-center gap-4">
                <button @click="openAuth('login')" class="nav-link text-xs" x-text="t('login')"></button>
                <button @click="toggleLang()" class="text-[10px] border border-white/20 px-2 py-1 rounded hover:bg-white/10" x-text="lang === 'cn' ? 'EN' : '中文'"></button>
            </div>
        </div>
    </nav>

    <header class="pt-48 pb-20 px-6 text-center">
        <h1 class="text-5xl md:text-8xl font-black mb-6 italic uppercase tracking-tighter">
            <span x-text="t('hero_title_1')"></span> <br>
            <span class="text-[#14F195]" x-text="t('hero_title_2')"></span>
        </h1>
        <p class="text-gray-400 text-lg max-w-2xl mx-auto mb-10" x-text="t('hero_desc')"></p>
        <div class="flex flex-wrap justify-center gap-4">
            <a href="services.html" class="btn-primary px-10 py-4 rounded-xl text-sm uppercase tracking-widest" x-text="t('btn_pricing')"></a>
            <button @click="openAuth('register')" class="card-bg px-10 py-4 rounded-xl text-sm font-bold uppercase tracking-widest" x-text="t('btn_register')"></button>
        </div>
    </header>

    <section id="policy" class="py-24 px-6 border-t border-white/5">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-3xl font-black mb-12 text-center" x-text="t('sec_policy')"></h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="card-bg p-8">
                    <div class="text-[#14F195] text-4xl mb-4 font-black">15%</div>
                    <div class="font-bold mb-2" x-text="t('p1_t')"></div>
                    <div class="text-xs text-gray-500" x-text="t('p1_d')"></div>
                </div>
                <div class="card-bg p-8 border-b-4 border-blue-500">
                    <div class="text-blue-500 text-4xl mb-4 font-black">VISA</div>
                    <div class="font-bold mb-2" x-text="t('p2_t')"></div>
                    <div class="text-xs text-gray-500" x-text="t('p2_d')"></div>
                </div>
                <div class="card-bg p-8">
                    <div class="text-purple-500 text-4xl mb-4 font-black">EF</div>
                    <div class="font-bold mb-2" x-text="t('p3_t')"></div>
                    <div class="text-xs text-gray-500" x-text="t('p3_d')"></div>
                </div>
                <div class="card-bg p-8">
                    <div class="text-orange-500 text-4xl mb-4 font-black">DUTY</div>
                    <div class="font-bold mb-2" x-text="t('p4_t')"></div>
                    <div class="text-xs text-gray-500" x-text="t('p4_d')"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="sop" class="py-24 px-6 bg-[#080808]">
        <div class="max-w-7xl mx-auto text-center">
            <h2 class="text-3xl font-black mb-16" x-text="t('sec_sop')"></h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <template x-for="(step, i) in sopSteps">
                    <div class="card-bg p-6 text-left relative overflow-hidden group">
                        <div class="absolute -right-2 -top-2 text-6xl font-black text-white/5 group-hover:text-[#14F195]/10 transition" x-text="i+1"></div>
                        <div class="text-[#14F195] text-xs font-mono mb-2" x-text="'STEP ' + (i+1)"></div>
                        <div class="text-sm font-bold" x-text="step[lang]"></div>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <section id="lifestyle" class="py-24 px-6 border-t border-white/5">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row gap-12 items-center">
                <div class="flex-1">
                    <h2 class="text-4xl font-black mb-6" x-text="t('life_t')"></h2>
                    <p class="text-gray-400 leading-relaxed mb-8" x-text="t('life_d')"></p>
                    <div class="grid grid-cols-2 gap-4 text-xs font-bold uppercase tracking-widest text-[#14F195]">
                        <div x-text="t('l1')"></div><div x-text="t('l2')"></div>
                        <div x-text="t('l3')"></div><div x-text="t('l4')"></div>
                    </div>
                </div>
                <div class="flex-1 w-full grid grid-cols-2 gap-4">
                    <div class="aspect-square card-bg bg-[url('lifestyle-1.jpg')] bg-cover"></div>
                    <div class="aspect-square card-bg bg-[url('lifestyle-2.jpg')] bg-cover mt-8"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="video" class="py-24 px-6 bg-[#080808] border-t border-white/5">
        <div class="max-w-5xl mx-auto text-center">
            <h2 class="text-3xl font-black mb-12" x-text="t('sec_video')"></h2>
            <div class="aspect-video card-bg flex items-center justify-center relative group cursor-pointer overflow-hidden">
                <img src="video-poster.jpg" class="absolute inset-0 w-full h-full object-cover opacity-50 group-hover:scale-105 transition">
                <div class="w-20 h-20 bg-[#14F195] rounded-full flex items-center justify-center text-black text-3xl z-10 shadow-2xl">▶</div>
                <div class="absolute bottom-6 left-6 text-left">
                    <div class="font-black text-lg uppercase">Hainan 2026: The New Singapore?</div>
                    <div class="text-xs text-gray-400">Official Infrastructure Preview</div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-20 border-t border-white/10 text-center">
        <div class="max-w-7xl mx-auto px-6">
            <div class="text-4xl font-black mb-8 italic">86-181 1779 0507</div>
            <div class="flex justify-center gap-8 mb-12">
                <div class="text-xs text-gray-500 uppercase tracking-widest">Telegram: @KOSOK0898</div>
                <div class="text-xs text-gray-500 uppercase tracking-widest">Email: kosok0898@gmail.com</div>
            </div>
            <div class="text-[9px] text-gray-800 uppercase tracking-[0.5em]">Hainan Digital Sovereign Infrastructure // 2026</div>
        </div>
    </footer>

    <div x-show="showAuthModal" class="fixed inset-0 z-[200] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4">
        <div @click.away="showAuthModal = false" class="card-bg w-full max-w-md p-10 relative">
            <button @click="showAuthModal = false" class="absolute top-6 right-6 text-2xl">×</button>
            <h3 class="text-2xl font-black mb-8 uppercase" x-text="authMode === 'login' ? t('login') : t('register')"></h3>
            <form class="space-y-4">
                <input type="text" :placeholder="t('f_user')" class="input-field text-sm">
                <input type="password" :placeholder="t('f_pass')" class="input-field text-sm">
                <button type="button" class="w-full btn-primary py-4 rounded-xl text-xs uppercase tracking-widest" x-text="t('f_submit')"></button>
            </form>
        </div>
    </div>

    <script>
        function site() {
            return {
                lang: localStorage.getItem('site_lang') || 'cn',
                showAuthModal: false,
                authMode: 'login',
                
                toggleLang() {
                    this.lang = this.lang === 'cn' ? 'en' : 'cn';
                    localStorage.setItem('site_lang', this.lang);
                },

                openAuth(mode) {
                    this.authMode = mode;
                    this.showAuthModal = true;
                },

                scrollTo(id) {
                    document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
                },

                // SOP 完整12步数据
                sopSteps: [
                    { cn: '企业落地需求初审与背景审计', en: 'Initial Audit & Requirement Review' },

                    top_bar: { cn: '系统状态：2026 海南封关运营模式已激活', en: 'STATUS: 2026 CUSTOM CLOSURE OPERATIONAL' },
                    nav_policy: { cn: '核心红利', en: 'ADVANTAGES' },

                    register: { cn: '免费注册', en: 'REGISTER' },

                    hero_desc: { cn: '为您打通 59 国免签政策、13 大园区入口及 EF 账户系统。执行 12 步标准合规交付，构建全球资产安全壁垒。', en: 'Access 59-nation visa-free entry, 13 industrial parks, and EF account systems. 12-step standardized compliance delivery.' },
                    btn_pricing: { cn: '查看 14 项业务报价单', en: 'VIEW 14-ITEM PRICING' },
                    btn_register: { cn: '立即创建企业账户', en: 'CREATE CORPORATE ACCOUNT' },
                    sec_policy: { cn: '海南自贸港四大战略红利', en: 'CORE STRATEGIC ADVANTAGES' },
                    p1_t: { cn: '双 15% 所得税', en: '15% INCOME TAX' },

                    p2_t: { cn: '59 国免签入境', en: 'VISA-FREE ACCESS' },

    </script>
</body>
</html>
