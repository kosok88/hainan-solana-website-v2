    <style>
        :root { --s-green: #14F195; --s-purple: #9945FF; --s-blue: #00C2FF; }
        [x-cloak] { display: none !important; }
        
        /* 深度视觉规划 */
        body { 
            background: #020205; color: #fff; font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(153,69,255,0.1) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(20,241,149,0.05) 0%, transparent 35%);
            background-attachment: fixed;
        }

        .grid-bg { 
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); 
            background-size: 50px 50px; 
        }

        .gradient-text { 
            background: linear-gradient(90deg, #fff, var(--s-green), var(--s-blue)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        /* 解决重叠问题的标题样式 */
        .hero-title {
            font-size: clamp(2.5rem, 8vw, 6rem);
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .neon-card { 
            background: rgba(255,255,255,0.01); 
            border: 1px solid rgba(255,255,255,0.05); 
            backdrop-filter: blur(20px); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .neon-card:hover { 
            border-color: var(--s-green); 
            transform: translateY(-10px); 
            background: rgba(255,255,255,0.03);
            box-shadow: 0 20px 50px rgba(20,241,149,0.1);
        }

        .price-card-active {
            border: 2px solid var(--s-purple);
            box-shadow: 0 0 30px rgba(153,69,255,0.2);
        }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { animation: marquee 60s linear infinite; }

        .lang-btn { font-weight: 900; font-size: 11px; opacity: 0.3; transition: 0.3s; cursor: pointer; border-bottom: 2px solid transparent; }
        .lang-btn.active { opacity: 1; color: var(--s-green); border-bottom: 2px solid var(--s-green); }
        
        html { scroll-behavior: smooth; }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #020205; }
        ::-webkit-scrollbar-thumb { background: var(--s-purple); border-radius: 10px; }
    </style>
</head>
