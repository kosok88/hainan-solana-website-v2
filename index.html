<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Hainan | 2026 海南封关全案交付中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #050505; color: #ffffff; font-family: 'Noto Sans SC', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .text-solana { color: #14F195; }
        .bg-solana { background-color: #14F195; }
        .card-bg { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 12px; 
            transition: all 0.3s ease; 
        }
        .card-bg:hover { border-color: #14F195; background: rgba(255, 255, 255, 0.06); transform: translateY(-3px); }
        .btn-primary { background-color: #14F195; color: #000000; font-weight: 900; transition: 0.3s; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .btn-primary:hover { box-shadow: 0 0 30px rgba(20, 241, 149, 0.3); transform: scale(1.02); }
        .input-field { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; color: #fff; outline: none; font-size: 12px; }
        .input-field:focus { border-color: #14F195; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>
<body x-data="site()" x-cloak class="antialiased">

    <div class="fixed top-0 w-full z-[120] bg-solana text-black text-[9px] font-black uppercase tracking-[0.3em] py-1 text-center" x-text="t('top_bar')"></div>

    <nav class="fixed top-6 w-full z-[110] bg-black/80 backdrop-blur-md border-b border-white/5 px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-7 h-7 bg-solana rounded flex items-center justify-center font-black text-black italic">S</div>
                <div class="flex flex-col">
                    <span class="text-lg font-black tracking-tighter leading-none uppercase">Solana Hainan</span>
                    <span class="text-[7px] text-solana font-bold tracking-widest uppercase">2026 Offshore</span>
                </div>
            </div>
            <div class="hidden xl:flex gap-8 items-center text-[10px] font-bold uppercase tracking-widest">
                <a @click="scrollTo('policy')" class="hover:text-solana transition cursor-pointer" x-text="t('nav_policy')"></a>
                <a href="parks.html" class="hover:text-solana transition cursor-pointer" x-text="t('nav_parks')"></a>
                <a href="services.html" class="hover:text-solana transition cursor-pointer" x-text="t('nav_pricing')"></a>
                <a @click="scrollTo('sop')" class="hover:text-solana transition cursor-pointer" x-text="t('nav_sop')"></a>
            </div>
            <div class="flex items-center gap-4">
                <button @click="openAuth()" class="bg-solana text-black px-5 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest transition hover:scale-105" x-text="t('register')"></button>
                <button @click="toggleLang()" class="text-[9px] border border-white/20 px-2 py-1 rounded uppercase hover:bg-white/5 font-black flex items-center">
                    <span x-text="lang.toUpperCase()"></span>
                </button>
            </div>
        </div>
    </nav>

    <header class="relative pt-48 pb-24 px-6 overflow-hidden">
        <div class="absolute top-20 left-1/2 -translate-x-1/2 w-[500px] h-[250px] bg-solana/10 blur-[100px] rounded-full -z-10"></div>
        <div class="max-w-5xl mx-auto text-center relative z-10">
            <div class="inline-block px-3 py-1 border border-solana/30 rounded-full text-[8px] font-black text-solana uppercase tracking-[0.3em] mb-8 animate-fade">Official Infrastructure 2026</div>
            <h1 class="text-3xl md:text-5xl font-black mb-10 italic uppercase tracking-tighter leading-[2.2] animate-fade">
                <span x-text="t('hero_title_1')"></span><br>
                <span class="text-solana" x-text="t('hero_title_2')"></span>
            </h1>
            <p class="text-gray-400 text-base max-w-2xl mx-auto mb-12 font-medium leading-relaxed animate-fade" x-text="t('hero_desc')"></p>
            <div class="flex flex-wrap justify-center gap-4 animate-fade">
                <a href="services.html" class="btn-primary px-8 py-3 rounded-lg text-[10px] uppercase tracking-widest" x-text="t('btn_pricing')"></a>
                <button @click="openAuth()" class="card-bg px-8 py-3 rounded-lg text-[10px] font-black uppercase tracking-widest hover:border-solana transition" x-text="t('btn_register')"></button>
            </div>
        </div>
    </header>

    <section id="policy" class="py-20 px-6 border-t border-white/5 bg-[#080808]">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-2xl font-black uppercase italic mb-12 tracking-tighter" x-text="t('sec_policy')"></h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <template x-for="(p, i) in policyData">
                    <div class="card-bg p-6 border-t-2" :style="'border-top-color:' + p.color">
                        <div class="text-2xl font-black mb-3 italic" :style="'color:' + p.color" x-text="p.val"></div>
                        <h3 class="text-sm font-black mb-2 uppercase tracking-tight" x-text="p.title[lang]"></h3>
                        <p class="text-gray-500 text-[11px] leading-relaxed" x-text="p.desc[lang]"></p>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <section id="parks" class="py-20 px-6 border-t border-white/5">
        <div class="max-w-7xl mx-auto text-center">
            <a href="parks.html" class="group inline-block mb-4">
                <h2 class="text-2xl md:text-3xl font-black italic uppercase tracking-tighter group-hover:text-solana transition">
                    <span x-text="t('sec_parks')"></span>
                    <span class="text-solana ml-2 text-xl">→</span>
                </h2>
            </a>
            <p class="text-gray-500 text-[11px] mb-12 max-w-xl mx-auto uppercase tracking-widest" x-text="t('parks_sub')"></p>
            
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 lg:grid-cols-7 gap-3">
                <template x-for="park in parksList">
                    <a href="parks.html" class="card-bg py-4 px-2 flex flex-col items-center justify-center text-center group">
                        <div class="w-6 h-6 mb-2 rounded border border-white/10 flex items-center justify-center text-gray-600 group-hover:text-solana group-hover:border-solana transition">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5"></path></svg>
                        </div>
                        <span class="text-[8px] font-black uppercase tracking-widest text-gray-400 group-hover:text-white transition" x-text="park[lang]"></span>
                    </a>
                </template>
            </div>
        </div>
    </section>

    <section id="sop" class="py-20 px-6 border-t border-white/5 bg-[#080808]">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-2xl font-black italic uppercase text-center mb-16 tracking-tighter" x-text="t('sec_sop')"></h2>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3">
                <template x-for="(step, i) in sopSteps">
                    <div class="card-bg p-4 min-h-[110px] flex flex-col justify-between group relative overflow-hidden">
                        <span class="absolute -right-1 -bottom-1 text-2xl font-black text-white/5 italic" x-text="i+1"></span>
                        <div class="text-[7px] font-bold text-solana uppercase mb-1">Step <span x-text="i+1 < 10 ? '0'+(i+1) : i+1"></span></div>
                        <h4 class="text-[10px] font-black leading-tight uppercase text-gray-300" x-text="step[lang]"></h4>
                        <div class="w-4 h-0.5 bg-white/10 group-hover:bg-solana transition-all duration-300 rounded-full mt-3"></div>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <footer id="footer" class="py-20 border-t border-white/10">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h2 class="text-3xl md:text-4xl font-black mb-8 italic uppercase tracking-tighter" x-text="t('footer_t')"></h2>
            <button @click="openAuth()" class="btn-primary px-10 py-4 rounded-xl text-[10px] uppercase tracking-widest mb-16" x-text="t('btn_register')"></button>
            <div class="pt-10 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6 text-[8px] text-gray-500 font-bold uppercase tracking-[0.2em]">
                <div class="flex items-center gap-3"><div class="w-5 h-5 bg-solana rounded flex items-center justify-center text-black italic font-black">S</div> SOLANA HAINAN © 2026</div>
                <div>TG: @KOSOK0898 | Email: kosok0898@gmail.com</div>
                <div>海南索拉纳商务咨询中心 | 琼ICP备 20240001号</div>
            </div>
        </div>
    </footer>

    <div x-show="showAuthModal" class="fixed inset-0 z-[200] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4">
        <div @click.away="showAuthModal = false" class="card-bg w-full max-w-md p-8 relative">
            <button @click="showAuthModal = false" class="absolute top-4 right-4 text-xl text-gray-500 hover:text-white">×</button>
            <div class="text-center mb-6">
                <h3 class="text-xl font-black text-solana italic uppercase" x-text="t('f_title')"></h3>
                <p class="text-[9px] text-gray-500 mt-1 uppercase tracking-widest" x-text="t('f_sub')"></p>
            </div>
            <form class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="cust_name" placeholder="Full Name" class="input-field">
                    <input type="text" id="cust_contact" placeholder="Telegram / Wechat" class="input-field">
                </div>
                <input type="text" id="cust_company" placeholder="Company Name" class="input-field">
                <textarea id="cust_req" placeholder="Specific Requirements" class="input-field h-24"></textarea>
                <button type="button" onclick="submitToGoogle(this)" class="w-full btn-primary py-3 rounded text-[10px] font-black uppercase tracking-widest" x-text="t('f_submit')"></button>
            </form>
        </div>
    </div>

    <script>
        function site() {
            return {
                lang: localStorage.getItem('site_lang') || 'cn',
                showAuthModal: false,
                policyData: [
                    {val:'15%', color:'#14F195', title:{cn:'所得税优惠', en:'Income Tax'}, desc:{cn:'企业与个人所得税封顶15%', en:'Capped at 15%'}},
                    {val:'VISA', color:'#3b82f6', title:{cn:'59国免签', en:'Visa-Free'}, desc:{cn:'全球商务往来无缝衔接', en:'59 nations access'}},
                    {val:'EF', color:'#8b5cf6', title:{cn:'自由账户', en:'EF Account'}, desc:{cn:'多功能跨境资金自由流动', en:'Free capital flow'}},
                    {val:'ZERO', color:'#f97316', title:{cn:'零关税', en:'Zero Duty'}, desc:{cn:'进口设备与原辅料免税', en:'Duty-free imports'}}
                ],
                parksList: [
                    {cn:'海口江东', en:'Jiangdong'}, {cn:'三亚CBD', en:'Sanya CBD'}, {cn:'博鳌乐城', en:'Boao'}, {cn:'洋浦开发', en:'Yangpu'},
                    {cn:'复兴城', en:'Fullsing'}, {cn:'崖州湾', en:'Yazhou'}, {cn:'海口保税', en:'FTZ'}, {cn:'生态软件', en:'Software'},
                    {cn:'文昌航天', en:'Aerospace'}, {cn:'陵水教育', en:'Education'}, {cn:'临高港', en:'Lingao'}, {cn:'高新区', en:'High-tech'}, {cn:'深海科技', en:'Deep Sea'}
                ],
                sopSteps: [
                    {cn:'审计评估', en:'Audit'}, {cn:'主体规划', en:'Legal'}, {cn:'园区选址', en:'Site'}, {cn:'工商核准', en:'Reg'}, 
                    {cn:'公章备案', en:'Seals'}, {cn:'银行面签', en:'Bank'}, {cn:'EF账户', en:'EF Acc'}, {cn:'税务核定', en:'Tax'},
                    {cn:'运营核查', en:'Review'}, {cn:'外管备案', en:'FOREX'}, {cn:'Web3合规', en:'Web3'}, {cn:'全案交付', en:'Delivery'}
                ],
                toggleLang() { this.lang = this.lang === 'cn' ? 'en' : 'cn'; localStorage.setItem('site_lang', this.lang); },
                openAuth() { this.showAuthModal = true; },
                scrollTo(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); },
                i18n: {
                    top_bar: { cn: '系统状态：2026 海南封关模式已激活', en: 'STATUS: 2026 CUSTOM CLOSURE ACTIVE' },
                    nav_policy: { cn: '核心红利', en: 'BENEFITS' }, nav_parks: { cn: '重点园区', en: 'PARKS' },
                    nav_pricing: { cn: '业务报价', en: 'PRICING' }, nav_sop: { cn: '交付流程', en: 'SOP' },
                    register: { cn: '立即咨询', en: 'CONSULT' },
                    hero_title_1: { cn: '锁定海南自贸港', en: 'SECURE HAINAN' },
                    hero_title_2: { cn: '离岸资产红利', en: 'OFFSHORE ASSETS' },
                    hero_desc: { cn: '为您打通免签政策、13大园区入口及EF账户系统，实现离岸资产最优布局。', en: 'Access 13 strategic parks and EF account system for offshore assets.' },
                    btn_pricing: { cn: '查看报价单', en: 'PRICING' }, btn_register: { cn: '建立企业账户', en: 'START NOW' },
                    sec_policy: { cn: '四大核心红利', en: 'ADVANTAGES' }, sec_parks: { cn: '全岛13大核心园区接入', en: '13 STRATEGIC PARKS' },
                    parks_sub: { cn: '精准匹配最佳政策落地园区', en: 'Matching your industry with the best site' },
                    sec_sop: { cn: '12步标准化交付SOP', en: '12-STEP SOP' },
                    footer_t: { cn: '开启您的离岸布局', en: 'READY TO START?' }, 
                    f_title: { cn: '项目咨询申请', en: 'PROJECT APPLICATION' },
                    f_sub: { cn: '资深顾问将在2小时内响应', en: 'RESPONSE WITHIN 2 HOURS' },
                    f_submit: { cn: '提交咨询', en: 'SUBMIT' }
                },
                t(key) { return this.i18n[key] ? this.i18n[key][this.lang] : key; }
            }
        }

        function submitToGoogle(btn) {
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxVRE8hkFdbj0ppfUuORI9QHYNS54meKEuJRyDS6rrFXsHIQI000LWfIPBnfolTcKAxiA/exec";
            const payload = {
                orderNumber: "SLN-" + Math.floor(Date.now() / 1000),
                submitTime: new Date().toLocaleString('zh-CN'),
                customerName: document.getElementById('cust_name').value.trim(),
                contact: document.getElementById('cust_contact').value.trim(),
                companyName: document.getElementById('cust_company').value.trim(),
                requirements: document.getElementById('cust_req').value.trim()
            };
            if (!payload.customerName || !payload.contact) { alert("请填写姓名和联系方式"); return; }
            btn.innerText = "提交中..."; btn.disabled = true;
            fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
            .then(() => { alert("✅ 提交成功！专人将尽快联系您。"); location.reload(); })
            .catch(() => { alert("网络异常"); btn.disabled = false; btn.innerText = "重试"; });
        }
    </script>
</body>
</html>
