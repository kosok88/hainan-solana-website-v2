<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Hainan | 2026 封关运作全球指挥中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        :root { --solana-green: #14F195; --solana-purple: #9945FF; }
        body { background: #030303; color: #fff; font-family: 'PingFang SC', 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(20, 241, 149, 0.4); }
        .marquee { background: var(--solana-green); color: #000; font-weight: 900; py: 8px; position: fixed; top: 0; width: 100%; z-index: 2000; }
        .sub-page { display: none; padding-top: 120px; min-height: 100vh; }
        .sub-page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body x-data="globalState()">

    <div class="marquee text-[10px] md:text-xs uppercase tracking-tighter py-2 overflow-hidden whitespace-nowrap">
        <div class="inline-block animate-marquee">
            <template x-for="i in 10">

        </div>

        <div class="flex items-center gap-4">
