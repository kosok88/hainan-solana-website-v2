    <style>
        :root { --s-green: #14F195; --s-purple: #9945FF; --s-blue: #00C2FF; }
        [x-cloak] { display: none !important; }

            background: #05050a; color: #fff; font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(153,69,255,0.25) 0%, transparent 45%),
                radial-gradient(circle at 100% 100%, rgba(20,241,149,0.2) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(0,194,255,0.05) 0%, transparent 50%);
            background-attachment: fixed;
        }
        
        .gradient-text { background: linear-gradient(90deg, #fff, var(--s-green), var(--s-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .neon-card { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); 
            backdrop-filter: blur(25px); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .neon-card:hover { border-color: var(--s-green); transform: translateY(-8px); box-shadow: 0 0 40px rgba(20,241,149,0.12); }
        
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { animation: marquee 35s linear infinite; }
        
        .lang-btn { font-weight: 900; text-transform: uppercase; font-size: 10px; opacity: 0.3; transition: 0.3s; }
        .lang-btn.active { opacity: 1; color: var(--s-green); border-bottom: 2px solid var(--s-green); }
        .sync-log { font-family: 'Fira Code', monospace; font-size: 10px; color: var(--s-green); }
